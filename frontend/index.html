<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AI Streaming Lab</title>

    <link rel="stylesheet" href="style.css" />
</head>

<body>

    <div class="container">
        <h1>AI Streaming Lab</h1>

        <p>
            Comparing normal AI responses vs streamed responses.
        </p>

        <div class="buttons">
            <button id="normal-btn">
                Normal Response
            </button>

            <button id="stream-btn">
                Stream Response
            </button>
        </div>

        <h3>Response</h3>
        <div id="response-box"></div>

        <hr />

        <h2>Concurrent Stream Simulation</h2>

        <div class="simulation-controls">

            <input type="number" id="stream-count" min="1" max="100" value="5" />

            <button id="simulate-btn">
                Launch Streams
            </button>
            <br />
            <label>Startup Delay (ms)</label>

            <input type="number" id="startup-delay" value="500" />

            <br />
            <label>Token Delay (ms)</label>

            <input type="number" id="token-delay" value="100" />

            <button id="reset-btn">
                Reset Metrics
            </button>

        </div>

        <div id="metrics-box"></div>

        <div id="metrics-dashboard">

            <div class="metric-card">
                <h3>Active Streams</h3>
                <p id="active-streams">0</p>
            </div>

            <div class="metric-card">
                <h3>Completed Streams</h3>
                <p id="completed-streams">0</p>
            </div>

            <div class="metric-card">
                <h3>Avg Tokens</h3>
                <p id="avg-tokens">0</p>
            </div>

            <div class="metric-card">
                <h3>First Token Latency</h3>
                <p id="first-token-latency">0 ms</p>
            </div>
            <div class="metric-card">
                <h3>Queued Streams</h3>
                <p id="queued-streams">0</p>
            </div>

        </div>
        <div id="streams-container"></div>

    </div>

    <script type="module" src="script.js"></script>
</body>

</html>
