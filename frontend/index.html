<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AI Streaming Lab</title>

    <link rel="stylesheet" href="style.css" />
</head>

<body>

    <div class="container">
        <header>
            <h1>AI Streaming Lab</h1>
            <p>Real-time systems observability console</p>
        </header>

        <div class="compact-demo">
            <div class="buttons">
                <button id="normal-btn">Normal</button>
                <button id="stream-btn">Stream</button>
            </div>
            <div id="response-box" class="compact-box">Waiting for response...</div>
        </div>

        <hr />

        <h2>Concurrent Systems Lab</h2>

        <div class="dashboard-grid">
            <div class="controls-panel">
                <div class="control-row">
                    <label>Count:</label>
                    <input type="number" id="stream-count" min="1" max="100" value="5" />
                </div>
                <div class="control-row">
                    <label>Startup (ms):</label>
                    <input type="number" id="startup-delay" value="500" />
                </div>
                <div class="control-row">
                    <label>Token (ms):</label>
                    <input type="number" id="token-delay" value="100" />
                </div>
                <div class="control-actions">
                    <button id="simulate-btn" class="btn-primary">Launch</button>
                    <button id="reset-btn">Reset</button>
                </div>
            </div>

            <div id="metrics-dashboard">
                <div class="metric-card">
                    <h3>Active</h3>
                    <p id="active-streams">0</p>
                </div>
                <div class="metric-card">
                    <h3>Queued</h3>
                    <p id="queued-streams">0</p>
                </div>
                <div class="metric-card">
                    <h3>Completed</h3>
                    <p id="completed-streams">0</p>
                </div>
                <div class="metric-card">
                    <h3>Avg Tokens</h3>
                    <p id="avg-tokens">0</p>
                </div>
                <div class="metric-card">
                    <h3>Latency</h3>
                    <p id="first-token-latency">0 ms</p>
                </div>
            </div>
        <div class="concurrency-visualization">
            <h3>Concurrency Slots</h3>
            <div id="concurrency-slots"></div>
            <div class="queue-status">Queue: <span id="slot-queue-count">0</span> waiting</div>
        </div>

        <div class="latency-history-section">
            <h3>Latency History</h3>
            <div id="latency-history-bars"></div>
        </div>

        <div id="streams-container"></div>
    </div>

    <script type="module" src="script.js"></script>
</body>

</html>
